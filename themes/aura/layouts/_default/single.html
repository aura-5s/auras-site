{{ define "main" }}
<div class="container">

  <header class="article-header">
    <h1 class="article-title">{{ .Title }}</h1>
    <div class="article-meta">
      <span>{{ .Date.Format "2006-01-02" }}</span>
      <span class="sep">/</span>
      <span>{{ .ReadingTime }} min de lectura</span>
    </div>
  </header>

  <div class="article-body {{ if eq (.Params.type | default "prosa") "verso" }}verse{{ end }}">
    <!-- {{ .Content }} -->
      {{ .Content }}
  </div>

</div>
{{ end }}
