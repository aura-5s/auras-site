{{ define "main" }}
<div class="container">

  <header class="anthology-header">
    <h1 class="anthology-title">{{ .Title }}</h1>
    <p class="anthology-subtitle">
      {{ len .Pages }} {{ if eq (len .Pages) 1 }}texto{{ else }}textos{{ end }}
    </p>
  </header>

  <ul class="writing-list">
    {{ range sort .Pages "Date" "desc" }}
    <li>
      <a href="{{ .RelPermalink }}" class="writing-item">
        <span class="writing-date">{{ .Date.Format "2006-01-02" }}</span>
        <span class="writing-type">{{ .Params.type | default "prosa" }}</span>
        <span class="writing-title">{{ .Title }}</span>
      </a>
    </li>
    {{ end }}
  </ul>

</div>
{{ end }}
